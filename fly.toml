app = "voidauth" #CHANGE ME
primary_region = "sin" #CHANGE ME
swap_size_mb = 512

[build]
  image = "voidauth/voidauth:latest"

[env]
  DB_ADAPTER = "postgres"
  DB_PORT = "5432"
  DB_USER = "postgres"
  DB_NAME = "postgres"
  DB_SSL = "false"
  DB_SSL_VERIFICATION = "false"

[[mounts]]
  source = "voidauth_config"
  destination = "/app/config"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
